name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the push was a version-bump commit from this workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Show runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Determine release version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          # Check if version already exists on npm OR as a GitHub release
          NPM_EXISTS=$(npm view "reponova@${CURRENT_VERSION}" version 2>/dev/null && echo "yes" || echo "no")
          GH_EXISTS=$(gh release view "v${CURRENT_VERSION}" --json tagName >/dev/null 2>&1 && echo "yes" || echo "no")

          if [ "$NPM_EXISTS" = "yes" ] || [ "$GH_EXISTS" = "yes" ]; then
            echo "Version ${CURRENT_VERSION} already published. Bumping patch..."

            # Bump patch version
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

            # Keep bumping until we find an unused version
            while npm view "reponova@${NEW_VERSION}" version >/dev/null 2>&1 || \
                  gh release view "v${NEW_VERSION}" --json tagName >/dev/null 2>&1; do
              NEW_PATCH=$((NEW_PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            done

            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "New version: $NEW_VERSION"
          else
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Using current version: $CURRENT_VERSION"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package.json version
        if: steps.version.outputs.bumped == 'true'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack tarball
        run: npm pack

      - name: Publish to npm
        run: npm publish --provenance

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create GitHub Release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARBALL=$(ls *.tgz)

          gh release create "v${VERSION}" "$TARBALL" \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
