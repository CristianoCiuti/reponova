# graphify-mcp-tools.yml
# Configuration for graphify-mcp-tools
# NOTE: All paths are relative to this file's location.
# When placed in an editor directory (e.g. .opencode/), use ../ to reference project root.

# Output directory
output: ../graphify-out

# Repositories to include in multi-repo build
repos:
  - name: my-project
    path: ..

# Build options
build:
  graphify_args: []         # extra arguments passed to graphify CLI (merge-graphs, update)
  exclude: []               # directory names to skip during detect (e.g. dist_package, .tox)
  html: true                # generate graph.html visualization after build
  # html_min_degree: 3      # if set, only include nodes with degree >= this value in HTML

# Outline options
outlines:
  enabled: true
  language: python
  paths:
    - "src/**/*.py"
  exclude:
    - "**/__pycache__/**"
    - "**/test_*.py"
    - "**/.git/**"

# Search index options
search:
  enabled: true
  fields:
    - label
    - type
    - source_file
    - properties

# MCP server options
server:
  # Reserved for future configuration
